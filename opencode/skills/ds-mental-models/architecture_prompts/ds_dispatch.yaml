# ============================================================================
# TASK CLASSIFICATION QUESTIONS
# ============================================================================
# Agent should ask these to determine task type

classification_questions:
  
  question_1_target:
    text: "Can you measure the target variable directly with a sensor?"
    if_no: "unmeasurable_target"
    
  question_2_labels:
    text: "Do you have labeled training data?"
    if_no: "no_labels"
    
  question_3_safety:
    text: "Are there catastrophic failure scenarios if the model is wrong?"
    if_yes: "safety_critical"
    
  question_4_domain:
    text: "What is the domain? (Physical / Medical / Financial / Standard)"
    map_domain: "physics_engineering / medical_biological / financial / standard_supervised"
    
  question_5_phase:
    text: "What phase are you in? (Exploratory / Development / Production)"
    map_phase: "exploratory / model_development / production"

# ============================================================================
# FAST LOOKUP TABLE (task -> models)
# ============================================================================
# For programmatic access - simple key-value

lookup:
  
  al2o3_estimation:
    task_type: [unmeasurable_target, physics_engineering, multi_scale]
    bundles: [foundation_modeling, soft_sensing]
    additional_models: [proxy_mediated, state_reconstruction, physics_first, multiscale_fusion, frequency_domain, safety_first, control_loop]
    
  battery_soc_estimation:
    task_type: [hidden_state, physics_engineering]
    bundles: [foundation_modeling]
    additional_models: [state_reconstruction, proxy_mediated, physics_first]
    
  fraud_detection:
    task_type: [safety_critical, imbalanced]
    bundles: [foundation_modeling, anomaly_detection]
    additional_models: [safety_first]
    
  house_price_prediction:
    task_type: [standard_regression]
    bundles: [foundation_modeling]
    
  customer_segmentation:
    task_type: [standard_supervised]
    bundles: [foundation_analysis]
    
  industrial_monitoring:
    task_type: [safety_critical, multi_scale, signal_analysis]
    bundles: [anomaly_detection]
    additional_models: [multiscale_fusion, frequency_domain, safety_first, control_loop]
